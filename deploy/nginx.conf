# /etc/nginx/sites-available/chan
#
# Nginx reverse proxy for Chan imageboard.
# Use this if you want to expose the board to the internet with HTTPS,
# add rate limiting at the proxy layer, or serve on port 80/443.
#
# Install:
#   sudo apt install nginx
#   sudo cp nginx.conf /etc/nginx/sites-available/chan
#   sudo ln -s /etc/nginx/sites-available/chan /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d yourdomain.com   # for HTTPS
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then set CHAN_BEHIND_PROXY=true in the systemd service.

# Rate limiting at nginx level — add a second layer on top of Rust
limit_req_zone $binary_remote_addr zone=chan_post:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=chan_get:10m  rate=60r/m;

server {
    listen 80;
    server_name yourdomain.com;   # ← change to your domain or LAN hostname

    # Redirect HTTP to HTTPS (remove this block for LAN-only HTTP use)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com;   # ← change to your domain or LAN hostname

    # ── TLS (managed by certbot) ────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ────────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "no-referrer"  always;
    add_header Content-Security-Policy
        "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; frame-ancestors 'none';"
        always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Upload size limit (match CHAN_MAX_FILE_SIZE) ────────────────────────────
    client_max_body_size 10M;

    # ── Static files cached at nginx level (saves Pi CPU) ──────────────────────
    location /static/ {
        proxy_pass http://127.0.0.1:8080/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Uploaded images cached ──────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── POST routes: rate limited ────────────────────────────────────────────────
    location ~ ^/[^/]+/$ {
        limit_req zone=chan_post burst=3 nodelay;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/proxy_params;
    }

    location ~ ^/[^/]+/thread/[0-9]+$ {
        limit_req zone=chan_post burst=3 nodelay;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/proxy_params;
    }

    # ── All other routes ────────────────────────────────────────────────────────
    location / {
        limit_req zone=chan_get burst=20 nodelay;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/proxy_params;
    }
}

# ── /etc/nginx/proxy_params (standard file, usually already exists) ──────────
# proxy_set_header Host              $http_host;
# proxy_set_header X-Real-IP         $remote_addr;
# proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
# proxy_set_header X-Forwarded-Proto $scheme;
# proxy_read_timeout 60s;
# proxy_connect_timeout 10s;
