# cargo-deny configuration for RustChan
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false

[advisories]
unmaintained = "all"
yanked = "deny"

[licenses]
confidence-threshold = 0.8

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
    "Unlicense",
    # Used by ring, rustls-webpki, untrusted (via rustls/reqwest)
    "ISC",
    # Used by webpki-roots (Mozilla CA certificate bundle)
    "CDLA-Permissive-2.0",
]

[[licenses.exceptions]]
name    = "encoding_rs"
version = "*"
allow   = ["MIT", "Apache-2.0", "BSD-2-Clause"]

[bans]
multiple-versions = "warn"

# argon2 → password-hash → rand_core 0.6
[[bans.skip]]
name    = "rand_core"
version = "0.6"

[[bans.skip]]
name    = "getrandom"
version = "0.2"

[[bans.skip]]
name    = "getrandom"
version = "0.3"

[[bans.skip]]
name    = "getrandom"
version = "0.4"

[[bans.skip]]
name    = "r-efi"
version = "5"

[[bans.skip]]
name    = "r-efi"
version = "6"

[[bans.skip]]
name    = "hashbrown"
version = "0.14"

[[bans.skip]]
name    = "hashbrown"
version = "0.16"

[[bans.skip]]
name    = "windows-sys"
version = "0.61"

[[bans.skip]]
name    = "zune-core"
version = "0.5"

[[bans.skip]]
name    = "zune-jpeg"
version = "0.5"

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]